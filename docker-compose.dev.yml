version: '3.9'

# ── Uso: docker-compose -f docker-compose.dev.yml up ──────────────
# Sobe apenas PostgreSQL e Redis em desenvolvimento.
# Backend e frontend rodam fora do Docker com hot-reload.

services:
  postgres:
    image: postgres:16-alpine
    container_name: freeapi_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: freeapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: freeapi_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freeapi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: freeapi_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  # Adminer — interface web para o banco (opcional)
  adminer:
    image: adminer:latest
    container_name: freeapi_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
